name: Supabase Keep-Alive (Autonomous)

on:
  schedule:
    # Runs at 14:00 UTC every Monday and Thursday
    # (9:00 AM Central Time)
    - cron: '0 14 * * 1,4'
  workflow_dispatch: {} # Explicit empty block to ensure the trigger is recognized

jobs:
  ping_database:
    runs-on: ubuntu-latest
    steps:
      - name: Send Heartbeat to PostgREST API
        run: |
          curl -I -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_SECRET_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SECRET_KEY }}"
